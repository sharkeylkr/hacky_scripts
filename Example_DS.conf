# ==============================================================================
# dragonsmash.conf — configuration for lsharkey@marvin/zaphod
# Place this file alongside dragonSMASHv3.bash in your scripts directory.
# ==============================================================================

# Bakta database (required)
BAKTA_DB=/home/lsharkey/dbs/bakta/v6/db

# Conda environment names
ENV_NAME_DRAGONFLYE=dragonflye
ENV_NAME_SEQKIT=seqkit
ENV_NAME_BAKTA=bakta
ENV_NAME_ANTISMASH=antismash8
ENV_NAME_GTDBTK=gtdbtk

# GTDBTk — use the shared MDU env (v2.6.1, uses skani not fastANI)
# Torsten's recommendation: conda activate /home/shared/conda/envs/gtdbtk
GTDBTK_CONDA_PREFIX=/home/shared/conda/envs/gtdbtk
GTDBTK_DATA_PATH=/home/shared/db/gtdbtk/release226
GTDBTK_SKANI_SKETCH_DIR=/home/shared/db/gtdbtk/release226/skani/sketches
# ENV_NAME_GTDBTK is ignored when GTDBTK_CONDA_PREFIX is set

# antiSMASH options
# Taxon: 'bacteria' (default) or 'fungi'
ANTISMASH_TAXON=bacteria
# Extra flags — remove any you don't need to speed up runs, or add more:
#   --pfam2go --smcog-trees  (heavier, adds Pfam and phylogenetics)
ANTISMASH_EXTRA_ARGS=--cc-mibig --cb-general --cb-subcluster --cb-knownclusters --rre

# barrnap options
# Kingdom: 'bac' (default), 'arc' (archaea), 'euk' (eukaryote)
BARRNAP_KINGDOM=bac
# Minimum score threshold (0–1). Lower = more permissive. Default: 0.8
BARRNAP_MIN_SCORE=0.8

# 16S rRNA identification (Stage 5)
# Create env with: conda create -n 16S_ID_env -c bioconda -c conda-forge barrnap kraken2 -y
ENV_NAME_BARRNAP=16S_ID_env
SILVA_DB=/home/shared/db/kraken2/silva

# check every 10 min, kill after 3 stalled checks (= 30 min no CPU)
WATCHDOG_INTERVAL_SECS=600
WATCHDOG_STALL_CHECKS=3
